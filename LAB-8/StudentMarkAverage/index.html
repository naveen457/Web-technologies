<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Average Mark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        div {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            position: relative;
            top: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        input {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        #result:empty {
            background: #f8f9fa;
            color: #6c757d;
            border: 2px dashed #dee2e6;
        }
    </style>
</head>

<body>
    <div>
        <h1>Average Mark of the Student</h1>
        <form action="#">
            <label for="name">Student name:</label>
            <input type="text" id="name">

            <label for="m1">Subject1 mark:</label>
            <input type="number" id="m1" min="0" max="100" required>

            <label for="m2">Subject2 mark:</label>
            <input type="number" id="m2" min="0" max="100" required>

            <label for="m3">Subject3 mark:</label>
            <input type="number" id="m3" min="0" max="100" required>

            <button type="button" onclick="calculateAverage()">Calculate total and Average</button>
        </form>
        <p id="result"></p>
    </div>

    <script>
        const calculateAverage = () => {
            let name = document.getElementById("name").value.trim();
            let m1 = parseFloat(document.getElementById("m1").value) || 0;
            let m2 = parseFloat(document.getElementById("m2").value) || 0;
            let m3 = parseFloat(document.getElementById("m3").value) || 0;

            let sum = m1 + m2 + m3;
            let average = sum / 3;

            document.getElementById("result").innerHTML =
                `Student name: ${name || 'Not entered'}<br>Total Marks: ${sum}<br>Average Marks: ${average.toFixed(2)}`;
        };
    </script>

</body>

</html>
