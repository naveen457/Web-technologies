<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Search</title>

    <style>
        body {
            font-family: Arial;
            padding: 30px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .loading {
            color: blue;
        }
    </style>
</head>

<body>

    <h2>Live Product Search</h2>

    <input type="text" id="searchBox" placeholder="Search products...">

    <div id="status"></div>

    <div id="results"></div>

    <script src="script.js"></script>

</body>

</html>
