<!DOCTYPE html>
<html>

<head>
    <title>Student Record System</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 6px;
            margin: 5px;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Student Record System</h2>

    <!-- Input Form -->

    <input type="text" id="sid" placeholder="Student ID">
    <input type="text" id="sname" placeholder="Name">
    <input type="text" id="course" placeholder="Course">
    <input type="number" id="marks" placeholder="Marks">

    <br>

    <button onclick="addStudent()">Add</button>
    <button onclick="updateStudent()">Update</button>
    <button onclick="deleteStudent()">Delete</button>

    <div id="msg"></div>

    <!-- Table -->

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Marks</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>
    </table>

    <script src="script.js"></script>

</body>

</html>
