<!DOCTYPE html>
<html>

<head>
    <title>Product Inventory System</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 6px;
            margin: 5px;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        .low-stock {
            background-color: #ffcccc;
            color: red;
            font-weight: bold;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }

        #total {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Product Inventory System</h2>

    <!-- Input Form -->

    <input type="text" id="pid" placeholder="Product ID">
    <input type="text" id="pname" placeholder="Name">
    <input type="text" id="category" placeholder="Category">
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="stock" placeholder="Stock">

    <br>

    <button onclick="addProduct()">Add</button>
    <button onclick="updateProduct()">Update</button>
    <button onclick="deleteProduct()">Delete</button>

    <br><br>

    <!-- Search -->

    <input type="text" id="searchCat" placeholder="Search by Category">
    <button onclick="searchByCategory()">Search</button>
    <button onclick="resetSearch()">Reset</button>

    <div id="msg"></div>

    <!-- Table -->

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>

        <tbody id="productTable"></tbody>
    </table>

    <div id="total"></div>

    <script src="script.js"></script>

</body>

</html>
