<!DOCTYPE html>
<html>

<head>
    <title>Employee Management System</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        input {
            margin: 5px;
            padding: 5px;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Employee Management System</h2>

    <!-- Form -->
    <div>
        <input type="text" id="eid" placeholder="ID">
        <input type="text" id="ename" placeholder="Name">
        <input type="text" id="dept" placeholder="Department">
        <input type="text" id="salary" placeholder="Salary">

        <br>

        <button onclick="addEmployee()">Add</button>
        <button onclick="updateEmployee()">Update</button>
        <button onclick="deleteEmployee()">Delete</button>
    </div>

    <div id="msg"></div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
            </tr>
        </thead>

        <tbody id="empTable"></tbody>
    </table>

    <script src="script.js"></script>

</body>

</html>
